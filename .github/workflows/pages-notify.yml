name: Pages部署完成邮件通知(163邮箱)
on:
  page_build: # GitHub Pages构建完毕自动触发

jobs:
  send-notify-mail:
    runs-on: ubuntu-latest
    env:
      SEND_ADDR: ${{ secrets.MAIL_163_SEND_ADDR }}
      RECV_ADDR: ${{ secrets.MAIL_RECV_ADDR }}
    
    steps:
      # 浅克隆、提取提交信息、时区转换、计算构建耗时
      - name: 处理仓库与时间计算
        run: |
          git clone --depth 1 https://github.com/${{ github.repository }} tmp_repo
          cd tmp_repo
          git fetch --unshallow
          
          # 1. 总提交数，标准单行写入无问题
          echo "TOTAL_COMMIT=$(git rev-list --count HEAD)" >> $GITHUB_ENV
          
          # 2. 关键修复：把提交信息所有换行替换成空格，消除换行导致的env解析报错
          RAW_MSG=$(git log -1 --pretty=%B)
          # 将换行符 \n 全部替换为空格，压缩为单行文本
          SAFE_COMMIT_MSG=$(echo "$RAW_MSG" | tr '\n' ' ')
          echo "COMMIT_MSG=$SAFE_COMMIT_MSG" >> $GITHUB_ENV

          # 原始UTC时间
          UTC_START="${{ github.event.build.created_at }}"
          UTC_END="${{ github.event.build.updated_at }}"

          # 转北京时间显示
          CST_START=$(date -d "$UTC_START + 8 hours" "+%Y-%m-%d %H:%M:%S")
          CST_END=$(date -d "$UTC_END + 8 hours" "+%Y-%m-%d %H:%M:%S")
          echo "BUILD_START_CST=$CST_START" >> $GITHUB_ENV
          echo "BUILD_END_CST=$CST_END" >> $GITHUB_ENV

          # 转为时间戳（秒）计算差值
          TS_START=$(date -d "$UTC_START" +%s)
          TS_END=$(date -d "$UTC_END" +%s)
          DIFF_SEC=$(( TS_END - TS_START ))

          # 换算时分秒
          H=$(( DIFF_SEC / 3600 ))
          M=$(( (DIFF_SEC % 3600) / 60 ))
          S=$(( DIFF_SEC % 60 ))
          DURATION="${H}时${M}分${S}秒"
          echo "BUILD_DURATION=$DURATION" >> $GITHUB_ENV

      # 发送邮件
      - name: 发送部署完成邮件
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.126.com
          server_port: 465
          username: ${{ secrets.MAIL_163_USER }}
          password: ${{ secrets.MAIL_163_AUTH_CODE }}
          from: ${{ env.SEND_ADDR }}
          to: ${{ env.RECV_ADDR }}

          subject: 【网站部署完成-通知】GitHub Pages站点部署完成。
          body: |
            宝宝~你的 GitHub 网站已经部署完成了咯
            ======================================
            【提交信息】
            仓库地址：https://github.com/${{ github.repository }}
            本次提交内容：${{ env.COMMIT_MSG }}
            本次提交哈希：${{ github.sha }}
            提交人：${{ github.actor }}
            仓库总提交次数：${{ env.TOTAL_COMMIT }}
            部署分支：${{ github.ref }}
            
            【构建信息（UTC+8）】
            Pages构建ID：${{ github.event.build.id }}
            构建状态：${{ github.event.build.status }}
            构建开始时间：${{ env.BUILD_START_CST }}
            构建完成时间：${{ env.BUILD_END_CST }}
            构建总耗时：${{ env.BUILD_DURATION }}
            构建操作系统：Linux-ubuntu-latest
            
            【邮件工作流信息】
            发件邮箱：${{ env.SEND_ADDR }}
            收件邮箱：${{ env.RECV_ADDR }}
            本次工作流运行ID：${{ github.run_id }}
            全局累计批次：${{ github.run_number }}
            本条运行次数：${{ github.run_attempt }}
            触发事件名：${{ github.event_name }}
            
            宝宝~
            Cloudflare缓存已经让另一条Action用Cloudflare API清理了，如果那一条Action没报错的话，那缓存就已经删干净了~；
            看完记得多陪陪我嘛，超级想黏着你！爱你爱你~
            （本邮件由Github Action自动SMTP发送，无需回复）
            果园编程
